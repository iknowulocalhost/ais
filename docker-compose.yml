version: "3.9"

# Базовая композиция сервисов АИС: Студенты.
# Для локальной разработки используйте docker-compose.dev.yml (override):
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
# Для продакшена — docker-compose.prod.yml (override).

networks:
  ais_net:
    driver: bridge

volumes:
  pg_data:
  redis_data:
  minio_data:

services:
  # ----------------------------------------------------------------------
  # PostgreSQL 15 + расширение TimescaleDB (для hypertable audit_logs).
  # ----------------------------------------------------------------------
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: ais_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ais}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ais_secret}
      POSTGRES_DB: ${POSTGRES_DB:-ais_students}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ais} -d ${POSTGRES_DB:-ais_students}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ais_net

  # ----------------------------------------------------------------------
  # Redis — кэш и хранилище сессий/refresh-токенов.
  # ----------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: ais_redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-redis_secret}", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ais_net

  # ----------------------------------------------------------------------
  # MinIO — S3-совместимое файловое хранилище (аватары, сканы документов).
  # ----------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: ais_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin_secret}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - ais_net

  # ----------------------------------------------------------------------
  # Backend — NestJS API.
  # ----------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: ais_backend
    restart: unless-stopped
    # CSV-выгрузки из 1С (приказы о зачислении, переменах) лежат рядом с
    # исходниками, монтируем read-only — приложение только читает.
    # Без этого OrderLookupService падает с ENOENT и автозаполнение печатных
    # форм отключено.
    volumes:
      - ./backend/data:/app/data:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      # У провайдера колледжа AAAA для poo.zabedu.ru/chtotib.ru — `100::1`
      # (discard-prefix). Node 18+ по умолчанию пробует IPv6 первым и виснет
      # ETIMEDOUT. Принудительно предпочитаем IPv4.
      NODE_OPTIONS: "--dns-result-order=ipv4first"
      APP_PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-ais}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-ais_secret}
      DB_NAME: ${POSTGRES_DB:-ais_students}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secret}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin_secret}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change_me_access}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_me_refresh}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-7d}
      SUPERADMIN_EMAIL: ${SUPERADMIN_EMAIL:-}
      SUPERADMIN_PASSWORD: ${SUPERADMIN_PASSWORD:-}
      APPLICANTS_ENC_KEY: ${APPLICANTS_ENC_KEY:-}
      # Интеграция с poo.zabedu.ru (Сетевой ПОО, IRTech). Read-only.
      POOZABEDU_BASE_URL: ${POOZABEDU_BASE_URL:-https://poo.zabedu.ru}
      POOZABEDU_USERNAME: ${POOZABEDU_USERNAME:-}
      POOZABEDU_PASSWORD: ${POOZABEDU_PASSWORD:-}
      POOZABEDU_TIMEOUT_MS: ${POOZABEDU_TIMEOUT_MS:-10000}
      POOZABEDU_MIN_INTERVAL_MS: ${POOZABEDU_MIN_INTERVAL_MS:-500}
      # Active Directory (LDAP) — если LDAP_SERVER_URI не задан, фича выключена.
      LDAP_SERVER_URI: ${LDAP_SERVER_URI:-}
      LDAP_PORT: ${LDAP_PORT:-389}
      LDAP_CONNECT_TIMEOUT_MS: ${LDAP_CONNECT_TIMEOUT_MS:-5000}
      LDAP_BIND_DN: ${LDAP_BIND_DN:-}
      LDAP_BIND_PASSWORD: ${LDAP_BIND_PASSWORD:-}
      LDAP_SEARCH_BASE: ${LDAP_SEARCH_BASE:-}
      LDAP_USER_FILTER: ${LDAP_USER_FILTER:-}
      LDAP_USER_ATTRIBUTES: ${LDAP_USER_ATTRIBUTES:-}
      LDAP_DEFAULT_EMAIL_DOMAIN: ${LDAP_DEFAULT_EMAIL_DOMAIN:-local}
      LDAP_ADMIN_GROUP_DN: ${LDAP_ADMIN_GROUP_DN:-}
      LDAP_STAFF_GROUP: ${LDAP_STAFF_GROUP:-}
      LDAP_ORGANIZER_GROUP: ${LDAP_ORGANIZER_GROUP:-}
      LDAP_USER_EXCLUDE_OUS: ${LDAP_USER_EXCLUDE_OUS:-}
      # MAX-бот (мессенджер max.ru). Если URL/секрет пустые — фича выключена,
      # уведомления просто пропускаются (см. CompositeNotificationChannel).
      MAX_BOT_URL: ${MAX_BOT_URL:-}
      MAX_BOT_AIS_SHARED_SECRET: ${MAX_BOT_AIS_SHARED_SECRET:-}
      MAX_BOT_USERNAME: ${MAX_BOT_USERNAME:-}
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    networks:
      - ais_net

  # ----------------------------------------------------------------------
  # Frontend — Next.js.
  # ----------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: ais_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      PORT: 3000
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    networks:
      - ais_net
